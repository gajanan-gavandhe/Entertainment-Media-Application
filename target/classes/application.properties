# ─── Server ───────────────────────────────────────────────────
server.port=8083

# ─── Database ─────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/streamverse_db3?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Gajanan
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ─── JWT ──────────────────────────────────────────────────────
jwt.secret=StreamVerse2024SecretKeyMustBe256BitsLongForHS256AlgorithmSecurity
jwt.expiration=86400000

# ─── File Upload ──────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=2GB
spring.servlet.multipart.max-request-size=2GB
app.upload.dir=uploads

# ─── Logging ──────────────────────────────────────────────────
logging.level.com.streamverse=INFO
logging.level.org.springframework.security=WARN
